<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Payment — ACBA Bank Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden">
    <!-- Bank header -->
    <div class="bg-gradient-to-r from-[#003366] to-[#004d99] px-6 py-4 flex items-center justify-between">
      <div>
        <p class="text-white font-bold text-lg">ACBA Bank</p>
        <p class="text-white/60 text-xs">Test Payment Gateway</p>
      </div>
      <div class="bg-white/10 px-3 py-1 rounded-full">
        <span class="text-yellow-300 text-xs font-bold">TEST MODE</span>
      </div>
    </div>

    <!-- Payment details -->
    <div class="p-6">
      <div class="bg-gray-50 rounded-xl p-4 mb-6">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Payment Details</p>
        <div class="space-y-2">
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Merchant</span>
            <span id="merchant-name" class="text-sm font-semibold text-gray-900">AgentPark</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Event</span>
            <span id="event-title" class="text-sm font-semibold text-gray-900">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm text-gray-600">Registrant</span>
            <span id="registrant-name" class="text-sm font-semibold text-gray-900">—</span>
          </div>
          <div class="flex justify-between border-t pt-2 mt-2">
            <span class="text-sm font-medium text-gray-700">Total Amount</span>
            <span id="amount" class="text-lg font-bold text-[#003366]">—</span>
          </div>
        </div>
      </div>

      <!-- Simulated card form (non-functional, visual only) -->
      <div class="mb-6">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-3">Card Information (Test)</p>
        <div class="space-y-3">
          <input type="text" value="4111 1111 1111 1111" readonly class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-500 bg-gray-50">
          <div class="flex gap-3">
            <input type="text" value="12/28" readonly class="flex-1 px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-500 bg-gray-50">
            <input type="text" value="123" readonly class="w-20 px-4 py-3 border border-gray-200 rounded-lg text-sm text-gray-500 bg-gray-50">
          </div>
        </div>
        <p class="text-[10px] text-gray-400 mt-2">This is a test environment. No real payment will be processed.</p>
      </div>

      <!-- Action buttons -->
      <div class="space-y-3">
        <button onclick="simulatePayment('approved')"
          class="w-full px-6 py-3.5 bg-green-600 text-white font-bold text-sm rounded-xl hover:bg-green-700 active:scale-[0.98] transition-transform duration-150">
          Approve Payment
        </button>
        <button onclick="simulatePayment('declined')"
          class="w-full px-6 py-3.5 bg-red-500 text-white font-bold text-sm rounded-xl hover:bg-red-600 active:scale-[0.98] transition-transform duration-150">
          Decline Payment
        </button>
        <button onclick="simulatePayment('error')"
          class="w-full px-6 py-3 border border-gray-200 text-gray-500 font-medium text-sm rounded-xl hover:bg-gray-50 transition-colors duration-150">
          Simulate Error
        </button>
      </div>
    </div>

    <div class="bg-gray-50 px-6 py-3 text-center">
      <p class="text-[10px] text-gray-400">ACBA Bank Test Gateway — For development use only</p>
    </div>
  </div>

  <script src="config.js?v=2"></script>
  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id') || 'test_' + Date.now();
    const amount = parseInt(params.get('amount')) || 0;
    const currency = params.get('currency') || 'AMD';
    const eventTitle = params.get('event_title') || 'Test Event';
    const registrantName = params.get('name') || 'Test User';
    const registrationId = params.get('registration_id') || '';
    const eventId = params.get('event_id') || '';
    const userLang = params.get('lang') || 'en';
    const returnUrl = params.get('return_url') || '/event.html';

    // Display payment details
    document.getElementById('event-title').textContent = eventTitle;
    document.getElementById('registrant-name').textContent = registrantName;
    document.getElementById('amount').textContent = amount.toLocaleString() + ' ' + currency;

    function simulatePayment(status) {
      // In test mode, we update the registration directly via Supabase
      // and then redirect to the return URL with status
      const txnId = 'txn_test_' + Math.random().toString(36).substr(2, 9);

      if (status === 'approved') {
        // Update registration in Supabase
        fetch(SUPABASE_URL + '/rest/v1/registrations?payment_order_id=eq.' + orderId, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            payment_status: 'paid',
            payment_txn_id: txnId,
            paid_at: new Date().toISOString(),
          }),
        }).then(() => {
          // Log to payments table
          return fetch(SUPABASE_URL + '/rest/v1/payments', {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal',
            },
            body: JSON.stringify({
              registration_id: registrationId || null,
              event_id: eventId || null,
              order_id: orderId,
              amount: amount,
              currency: currency,
              status: 'approved',
              bank_response: { test: true, txn_id: txnId, simulated: true },
            }),
          });
        }).then(() => {
          // Send confirmation email (fire-and-forget)
          if (registrationId) {
            fetch(SUPABASE_URL + '/functions/v1/send-confirmation-email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
              body: JSON.stringify({ registration_id: registrationId, lang: userLang }),
            }).catch(() => {});
          }
          redirect(status, txnId);
        }).catch(err => {
          console.error('Error updating payment:', err);
          redirect(status, txnId);
        });
      } else {
        // For declined/error, update status and redirect
        fetch(SUPABASE_URL + '/rest/v1/registrations?payment_order_id=eq.' + orderId, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            payment_status: 'failed',
          }),
        }).then(() => {
          // Log to payments table
          return fetch(SUPABASE_URL + '/rest/v1/payments', {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal',
            },
            body: JSON.stringify({
              registration_id: registrationId || null,
              event_id: eventId || null,
              order_id: orderId,
              amount: amount,
              currency: currency,
              status: status,
              bank_response: { test: true, simulated: true, reason: status },
            }),
          });
        }).then(() => {
          redirect(status, null);
        }).catch(err => {
          console.error('Error:', err);
          redirect(status, null);
        });
      }
    }

    function redirect(status, txnId) {
      const sep = returnUrl.includes('?') ? '&' : '?';
      let url = returnUrl + sep + 'payment=' + (status === 'approved' ? 'success' : 'failed');
      url += '&order_id=' + encodeURIComponent(orderId);
      if (txnId) url += '&txn_id=' + encodeURIComponent(txnId);
      window.location.href = url;
    }
  </script>
</body>
</html>
