        'body-html': "<p>AgentPark respects the privacy of website users and processes personal data only for legitimate purposes, including service delivery, order processing, customer communication, payment administration, security, and legal compliance.</p>\n          <p>The website may collect the following categories of data: first name, last name, company details, phone number, email address, non-sensitive payment-related information, technical data, IP address, browser data, and analytics relating to use of the website.</p>\n          <p>Card data is not stored on the website to the extent prohibited by applicable card security requirements. Card payments are processed in a secure payment environment provided by the relevant bank or payment service provider.</p>\n          <p>Personal data may be shared with third parties involved in website operation, payment processing, email communication, hosting, analytics, or legal compliance, but only to the extent necessary and subject to appropriate confidentiality safeguards.</p>\n          <p>Users may contact AgentPark to request access to, correction of, updating of, or deletion of their personal data, unless retention is required by applicable law.</p>\n          <p>The website may use cookies and similar technologies to ensure functionality, improve user experience, and support analytics. Continued use of the website may be treated as consent to such technologies where permitted by applicable law.</p>\n          <p>AgentPark takes reasonable technical and organizational measures to protect personal data, but no transmission over the internet can be guaranteed as absolutely secure.</p>\n          <p>At the cardholder’s request, the website provides the option to receive a copy of the document confirming the card transaction by email. For this purpose, a valid email address may be requested during or after the payment process.</p>\n          <p>For privacy questions or data requests, email <a href=\"mailto:info@agentpark.am\">info@agentpark.am</a>.</p>",

        'footer-terms': 'Ընդհանուր դրույթներ և պայմաններ',
        'footer-refund': 'Գումարի վերադարձի քաղաքականություն',
        'footer-delivery': 'Առաքման պայմաններ',
        'footer-privacy': 'Գաղտնիության քաղաքականություն',
        'footer-copy': '© 2026 AgentPark ՍՊԸ, Երևան, Հայաստան։ Բոլոր իրավունքները պաշտպանված են։',
      },
    };

    function setLang(lang) {
      if (!TRANS[lang]) lang = 'en';
      document.documentElement.lang = lang === 'am' ? 'hy' : 'en';
      localStorage.setItem('agentpark-lang', lang);
      const t = TRANS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
        btn.classList.toggle('active-lang', btn.dataset.lang === lang);
      });
      document.getElementById('page-title').textContent = t['page-title'];
      document.getElementById('legal-body').innerHTML = t['body-html'];
      document.title = t['page-title'] + ' — AgentPark';
    }

    (function() {
      var saved = localStorage.getItem('agentpark-lang') || 'en';
      setLang(saved);
    })();
  </script>
