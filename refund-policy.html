  <script>
    var TRANS = {
      en: {
        'back-to-home': 'Home',
        'legal-section': 'Legal',
        'last-updated': 'Last updated: 7 May 2026',
        'page-title': "Refund Policy",
        'body-html': "<p>Refund conditions may vary depending on the type of service purchased. If no special conditions are stated on the relevant service page or in an individual offer, this Refund Policy applies.</p>\n          <p>Payments for digital services, courses, workshops, events, or consulting services may be refunded only where the service was not delivered due to AgentPark’s fault or where the service was cancelled by AgentPark.</p>\n          <p>If participation has already been confirmed, a seat has been reserved, materials have been shared, or service delivery has started, AgentPark may refuse a full refund or may issue only a partial refund to reflect costs already incurred and organizational commitments already made.</p>\n          <p>For cancellation requests submitted before the service start date, AgentPark may apply a reasonable administrative deduction or partial refund terms depending on the nature of the service.</p>\n          <p>Refund requests must be sent to the email address indicated on the website and should include order details, payment date, amount paid, and the reason for the refund request. Requests are typically reviewed within 5 to 10 business days.</p>\n          <p>If approved, refunds are processed where possible to the same payment method used for the original transaction or by another method permitted by law and banking procedures. The final time for the funds to appear may depend on the acquiring bank or card scheme.</p>\n          <p>For refund requests, email <a href=\"mailto:info@agentpark.am\">info@agentpark.am</a>.</p>",
        'footer-terms': 'Terms & Conditions',
        'footer-refund': 'Refund Policy',
        'footer-delivery': 'Delivery Terms',
        'footer-privacy': 'Privacy Policy',
        'footer-copy': '© 2026 AgentPark LLC, Yerevan, Armenia. All rights reserved.',
      },
      am: {
        'back-to-home': 'Գլխավոր',
        'legal-section': 'Իրավական',
        'last-updated': 'Թարմացվել է՝ 7 մայիսի 2026',
        'page-title': "Գումարի վերադարձի քաղաքականություն",
        'body-html': "<p>Գումարի վերադարձի պայմանները կարող են տարբերվել՝ կախված գնված ծառայության տեսակից։ Եթե ծառայության էջում կամ անհատական առաջարկում հատուկ պայմաններ նշված չեն, կիրառվում է սույն քաղաքականությունը։</p>\n          <p>Թվանշային ծառայությունների, դասընթացների, աշխատարանների, միջոցառումների կամ խորհրդատվական ծառայությունների համար կատարված վճարումները կարող են վերադարձվել միայն այն դեպքերում, երբ ծառայությունը չի մատուցվել AgentPark-ի մեղքով, կամ ծառայությունը չեղարկվել է AgentPark-ի կողմից։</p>\n          <p>Եթե մասնակցությունն արդեն հաստատվել է, տեղը ամրագրվել է, նյութերը տրամադրվել են, կամ ծառայության մատուցումը սկսվել է, AgentPark-ը կարող է ամբողջական կամ մասնակի վերադարձ չկատարել՝ հաշվի առնելով արդեն իրականացված ծախսերն ու կազմակերպչական պարտավորությունները։</p>\n          <p>Մինչ ծառայության մեկնարկը ներկայացված չեղարկման դիմումների դեպքում AgentPark-ը կարող է կիրառել ողջամիտ վարչական պահում կամ վերադարձի մասնակի պայմաններ, եթե դա բխում է ծառայության բնույթից։</p>\n          <p>Գումարի վերադարձի դիմումը պետք է ուղարկվի կայքում նշված էլեկտրոնային փոստին՝ նշելով պատվերի տվյալները, վճարման ամսաթիվը, վճարված գումարը և վերադարձի պատճառը։ Դիմումները սովորաբար քննվում են 5–10 աշխատանքային օրվա ընթացքում։</p>\n          <p>Եթե վերադարձը հաստատվում է, այն իրականացվում է հնարավորության դեպքում նույն վճարային միջոցով, որով կատարվել է վճարումը, կամ օրենքով և բանկային ընթացակարգերով թույլատրելի այլ եղանակով։ Վերադարձի գումարի հաշվեգրման վերջնական ժամկետը կարող է կախված լինել սպասարկող բանկից կամ քարտային համակարգից։</p>\n          <p>Վերադարձի դիմումների համար գրեք՝ <a href=\"mailto:info@agentpark.am\">info@agentpark.am</a>։</p>",
        'footer-terms': 'Ընդհանուր դրույթներ և պայմաններ',
        'footer-refund': 'Գումարի վերադարձի քաղաքականություն',
        'footer-delivery': 'Առաքման պայմաններ',
        'footer-privacy': 'Գաղտնիության քաղաքականություն',
        'footer-copy': '© 2026 AgentPark ՍՊԸ, Երևան, Հայաստան։ Բոլոր իրավունքները պաշտպանված են։',
      },
    };

    function setLang(lang) {
      if (!TRANS[lang]) lang = 'en';
      document.documentElement.lang = lang === 'am' ? 'hy' : 'en';
      localStorage.setItem('agentpark-lang', lang);
      const t = TRANS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
        btn.classList.toggle('active-lang', btn.dataset.lang === lang);
      });
      document.getElementById('page-title').textContent = t['page-title'];
      document.getElementById('legal-body').innerHTML = t['body-html'];
      document.title = t['page-title'] + ' — AgentPark';
    }

    (function() {
      var saved = localStorage.getItem('agentpark-lang') || 'en';
      setLang(saved);
    })();
  </script>
</body>
</html>
