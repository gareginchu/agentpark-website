    var TRANS = {
      en: {
        'back-to-home': 'Home',
        'legal-section': 'Legal',
        'last-updated': 'Last updated: 7 May 2026',
        'page-title': "Delivery Terms",

        'footer-terms': 'Terms & Conditions',
        'footer-refund': 'Refund Policy',
        'footer-delivery': 'Delivery Terms',
        'footer-privacy': 'Privacy Policy',
        'footer-copy': '© 2026 AgentPark LLC, Yerevan, Armenia. All rights reserved.',
      },
      am: {
        'back-to-home': 'Գլխավոր',
        'legal-section': 'Իրավական',
        'last-updated': 'Թարմացվել է՝ 7 մայիսի 2026',
        'page-title': "Առաքման պայմաններ",
        'body-html': "<p>AgentPark.am կայքում առաջարկվող ծառայությունների մեծ մասը կարող է ունենալ ոչ նյութական կամ թվային բնույթ։ Այդ դեպքում «առաքում» հասկացությունը վերաբերում է ծառայության հասանելիության տրամադրմանը, գրանցման հաստատմանը, էլեկտրոնային նյութերի ուղարկմանը, առցանց հանդիպման հղման տրամադրմանը կամ համապատասխան ծառայության մեկնարկին։</p>\n          <p>Թվային նյութերը, մուտքի տվյալները, հաստատման նամակները կամ միջոցառման մասնակցության տեղեկատվությունը սովորաբար ուղարկվում են օգտատիրոջ կողմից նշված էլեկտրոնային փոստին պատվերի կամ վճարման հաջող ավարտից հետո։ Ուստի օգտատերը պարտավորվում է տրամադրել վավեր և գործող էլեկտրոնային փոստի հասցե։</p>\n          <p>Եթե ծառայությունը մատուցվում է օնլայն ձևաչափով, AgentPark-ը ծառայության մեկնարկից առաջ տրամադրում է համապատասխան մուտքի կամ մասնակցության տեղեկատվությունը ողջամիտ ժամկետում։ Եթե ծառայությունն իրականացվում է ֆիզիկական վայրում, կայքում կամ առաջարկում նշվում են անցկացման վայրը, օրը և ժամերը։</p>\n          <p>Եթե տրամադրվում է որևէ ֆիզիկական նյութ կամ ապրանք, դրա առաքման պայմանները, ժամկետները, արժեքը և աշխարհագրական սահմանափակումները պետք է առանձին նշվեն համապատասխան էջում կամ պատվերի ընթացքում։</p>\n          <p>AgentPark-ը պատասխանատվություն չի կրում առաքման ուշացման կամ անհնարինության համար, եթե պատճառը օգտատիրոջ կողմից տրամադրված սխալ տվյալներն են, էլեկտրոնային նամակների ֆիլտրումը, ֆորսմաժորային իրավիճակները կամ երրորդ կողմի ծառայությունների խափանումները։</p>\n          <p>Առաքման հետ կապված հարցերի համար գրեք՝ <a href=\"mailto:info@agentpark.am\">info@agentpark.am</a>։</p>",
        'footer-terms': 'Ընդհանուր դրույթներ և պայմաններ',
        'footer-refund': 'Գումարի վերադարձի քաղաքականություն',
        'footer-delivery': 'Առաքման պայմաններ',
        'footer-privacy': 'Գաղտնիության քաղաքականություն',
        'footer-copy': '© 2026 AgentPark ՍՊԸ, Երևան, Հայաստան։ Բոլոր իրավունքները պաշտպանված են։',
      },
    };

    function setLang(lang) {
      if (!TRANS[lang]) lang = 'en';
      document.documentElement.lang = lang === 'am' ? 'hy' : 'en';
      localStorage.setItem('agentpark-lang', lang);
      const t = TRANS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
        btn.classList.toggle('active-lang', btn.dataset.lang === lang);
      });
      document.getElementById('page-title').textContent = t['page-title'];
      document.getElementById('legal-body').innerHTML = t['body-html'];
      document.title = t['page-title'] + ' — AgentPark';
    }

    (function() {
      var saved = localStorage.getItem('agentpark-lang') || 'en';
      setLang(saved);
    })();
  </script>
</body>
</html>
